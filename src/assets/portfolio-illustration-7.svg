    <pattern id="hatch-consult" x="0" y="0" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#14b8a6" stroke-width="2" opacity="0.55" />
    </pattern>
    <linearGradient id="paper-consult" x1="0" y1="0" x2="0" y2="1">
