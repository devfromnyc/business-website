      <circle cx="2" cy="2" r="1" fill="#1c2030" opacity="0.10" />
    </pattern>
    <pattern id="grid-consult" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0 L0 0 0 40" fill="none" stroke="#1c2030" stroke-width="0.6" opacity="0.08" />
