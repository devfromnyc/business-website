<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200" preserveAspectRatio="xMidYMid slice">
  <defs>
    <pattern id="dots-shop" x="0" y="0" width="14" height="14" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#1c2030" opacity="0.10" />
    </pattern>
    <pattern id="grid-shop" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0 L0 0 0 40" fill="none" stroke="#1c2030" stroke-width="0.6" opacity="0.08" />
    </pattern>
    <pattern id="hatch-shop" x="0" y="0" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#fb923c" stroke-width="2" opacity="0.55" />
    </pattern>
    <linearGradient id="paper-shop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" />
      <stop offset="1" stop-color="#f8f3e8" />
    </linearGradient>
    <linearGradient id="accent-shop" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fb923c" stop-opacity="0.95" />
      <stop offset="1" stop-color="#fb923c" stop-opacity="0.55" />
    </linearGradient>
    <filter id="grain-shop">
